<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de adoção de cães</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header> <h1>Salve a vida de um animal de estimação.</h1> </header>
    <form id="formAdocao"></form>
        <label for="nome">Qual seu nome:</label>
        <input type="text" minlength="3" required> <br><br>
        <label for="idade">Qual sua idade:</label>
        <input type="text"><br><br>
        <label for="cpf">Qual seu CPF:</label>
        <input type="text"><br><br>
        <label for="email">Qual seu Email:</label>
        <input type="text"><br><br>
        <label for="telefone">Qual seu Telefone:</label>
        <input type="text"><br><br>
        <label for="cidade">Qual sua Cidade:</label>
        <input type="text"><br><br>
        <label for="quintal">Você possui quintal:</label>
        <select name="escolha" id="">
            <option value="opcao1"><S></S>Sim</option>
            <option value="opcao2">Não</option>
        </select><br><br>
        <label for="pet_anteriores">Já teve pet antes:</label>
        <select name="escolha" id="">
            <option value="opcao1">Sim</option>
            <option value="opcao2">Não</option>
        </select><br><br>
        <label for="horas">Quantas horas o animal ficará sozinho por dia:</label>
        <input type="text"><br><br>
        <label for="motivo">Motivo da adoção:</label><br>
        <textarea name="motivo"id= "motivo" rows="10" cols="30" placeholder="Escreva Aqui:"></textarea><br><br>
        <label for="moradia">Tipo de moradia (casa ou apartamento):</label>
        <select name="escolha" id="">
            <option value="opcao1">Casa</option>
            <option value="opcao2">Apartamento</option>
        </select><br><br>
        <input type="checkbox" id="termo"> Aceito o termo de responsabilidade<br><br>
         <button type="submit">Cadastrar</button>
         <h2 id="resultado"></h2>
        




</body>
</html>
